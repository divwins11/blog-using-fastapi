<!DOCTYPE html>
<html>
<head>
    <title>
        {%if title%}
            FastApi Blog - {{ title }}
        {%else%}
            FastAPI Blog
        {%endif%}
    </title>
</head>
<body>
    <h1>Welcome to FastAPI!</h1>
    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
    {% endfor %}
</body>
</html>
